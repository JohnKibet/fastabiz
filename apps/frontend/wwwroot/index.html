<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastaBiz</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <!-- ① MudBlazor — must be first, resets browser defaults and provides mud-* utilities -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <!-- ② Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />

    <!-- ③ Font Awesome (ONE copy — removed the three duplicate FA imports) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

    <!-- ④ Leaflet Awesome Markers CSS (only needed on map pages, but harmless globally) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.css" />

    <!-- ⑤ App styles — in dependency order -->
    <link rel="stylesheet" href="css/app.css" />        <!-- Blazor boot/error UI + global utilities  -->
    <link rel="stylesheet" href="css/layout.css" />     <!-- Section heights, sidebar, nav-link states -->
    <link rel="stylesheet" href="css/dashboard.css" />  <!-- MetricCard variants, card hover lifts      -->

    <!-- MudBlazor JS — in <head> is fine; it defers internally -->
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <!-- Leaflet Awesome Markers JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Leaflet.awesome-markers/2.0.2/leaflet.awesome-markers.js"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">✕</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <!-- App JS — after blazor.webassembly.js so interop is available -->
    <script src="js/site.js"></script>
    <script src="js/clickOutside.js"></script>
    <script src="js/pageStyles.js" defer></script>

    <!-- Lucide icons (used by legacy components still referencing LucideIcon) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        // Re-run createIcons after each Blazor navigation so dynamically
        // rendered Lucide icons are picked up
        window.addEventListener("DOMContentLoaded", () => lucide.createIcons());
        Blazor.addEventListener("enhancedload", () => lucide.createIcons());
    </script>

    <!-- Scroll-hide nav (kept as-is — no Blazor dependency) -->
    <script>
        let lastScroll = 0;
        window.addEventListener("scroll", function () {
            const nav = document.getElementById("scrollNav");
            if (!nav) return;
            const currentScroll = window.pageYOffset || document.documentElement.scrollTop;
            nav.classList.toggle("-translate-y-full", currentScroll > lastScroll);
            lastScroll = Math.max(0, currentScroll);
        });
    </script>
</body>
</html>
